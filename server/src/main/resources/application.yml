spring:
  application:
    name: server
  datasource:
    url: jdbc:mysql://${DB_HOST:39.105.51.168}:${DB_PORT:3306}/${DB_NAME:life_assistant}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8082}

# DeepSeek AI 配置
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}
